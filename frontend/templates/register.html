<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — LibraryPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="auth-page">

<div class="auth-bg">
  <div class="shape s1"></div><div class="shape s2"></div><div class="shape s3"></div>
</div>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo"><i class="fas fa-user-plus"></i></div>
    <h2 class="auth-title">Create Account</h2>
    <p class="auth-subtitle">Join LibraryPro today</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} py-2 mb-3">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <div class="form-group-custom">
        <label>Full Name</label>
        <div class="input-icon">
          <i class="fas fa-id-card"></i>
          <input type="text" name="full_name" class="form-input" placeholder="Your full name" required/>
        </div>
      </div>

      <div class="form-group-custom">
        <label>Username</label>
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" name="username" class="form-input" placeholder="Choose a username" required/>
        </div>
      </div>

      <div class="form-group-custom">
        <label>Email</label>
        <div class="input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" class="form-input" placeholder="your@email.com"/>
        </div>
      </div>

      <div class="form-group-custom">
        <label>Password</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" class="form-input" placeholder="Min 6 characters" required/>
          <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
        </div>
      </div>

      <div class="form-check-custom">
        <input type="checkbox" id="is_vip" name="is_vip" class="form-check-input"/>
        <label for="is_vip">I am Faculty / VIP member (priority access)</label>
      </div>

      <button type="submit" class="btn-auth">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll('.toggle-password').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = btn.previousElementSibling;
      input.type = input.type === 'password' ? 'text' : 'password';
      btn.querySelector('i').classList.toggle('fa-eye');
      btn.querySelector('i').classList.toggle('fa-eye-slash');
    });
  });
</script>
</body>
</html>
