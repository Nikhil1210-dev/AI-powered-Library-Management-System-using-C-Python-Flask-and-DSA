<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error {{ code }} — LibraryPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="auth-page">
<div class="auth-container">
  <div class="auth-card text-center">
    <div style="font-size:4rem;margin-bottom:1rem">
      {% if code == 404 %}🔍{% else %}⚠️{% endif %}
    </div>
    <h1 style="font-size:5rem;font-weight:700;color:var(--color-primary)">{{ code }}</h1>
    <h4 class="mb-2">{{ "Page Not Found" if code == 404 else "Server Error" }}</h4>
    <p class="text-muted mb-4">{{ msg }}</p>
    <a href="{{ url_for('dashboard') }}" class="btn-auth">
      <i class="fas fa-house"></i> Back to Dashboard
    </a>
  </div>
</div>
</body>
</html>
